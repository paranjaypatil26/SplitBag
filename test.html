<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Scraper Test</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; background: #0f172a; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; }
        button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #2563eb; }
        pre { background: #1e293b; padding: 20px; border-radius: 8px; overflow-x: auto; margin-top: 20px; }
        #loading { display: none; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>
    <h2>Test Scraper API</h2>
    <p>Paste a product URL below to test your deployed Supabase Edge Function.</p>
    
    <input type="text" id="urlInput" placeholder="https://www.amazon.com/..." value="https://www.amazon.com/Apple-AirPods-Pro-2nd-Gen/dp/B0D1XD1ZV3/">
    <button onclick="testScraper()">Verify Price</button>
    <p id="loading">Scraping (this can take 5-10 seconds)...</p>
    
    <pre id="result">Results will appear here...</pre>

    <script>
        async function testScraper() {
            const url = document.getElementById('urlInput').value;
            const resultBox = document.getElementById('result');
            const loading = document.getElementById('loading');
            
            resultBox.innerText = "";
            loading.style.display = "block";

            try {
                const response = await fetch('https://asqwrojaxtecjpejdxfm.supabase.co/functions/v1/verify-price', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                resultBox.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                resultBox.innerText = "Error: " + error.message;
            } finally {
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
